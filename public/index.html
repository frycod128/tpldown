<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件下载服务</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            margin: 0;
        }

        .refresh-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.3);
            color: white;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .refresh-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }

        .refresh-btn:active {
            transform: translateY(0);
        }

        .content {
            padding: 30px;
            min-height: 400px;
        }

        .file-list {
            list-style: none;
        }

        .file-item {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
            transition: background 0.2s;
        }

        .file-item:hover {
            background: #f5f5f5;
        }

        .directory-item {
            background: #f8f9fa;
        }

        .item-content {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .file-icon, .dir-icon {
            font-size: 20px;
            width: 30px;
        }

        .file-icon {
            color: #4caf50;
        }

        .dir-icon {
            color: #ff9800;
        }

        .file-name {
            flex: 1;
            font-size: 16px;
            color: #333;
        }

        .file-size {
            font-size: 12px;
            color: #999;
        }

        .download-link {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .children {
            margin-left: 30px;
            margin-top: 10px;
            list-style: none;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .error {
            text-align: center;
            padding: 40px;
            color: #f44336;
            background: #ffebee;
            border-radius: 8px;
        }

        .empty {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .breadcrumb {
            margin-bottom: 20px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 8px;
            font-size: 14px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .refresh-btn.loading svg {
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📁 文件下载中心</h1>
        <button class="refresh-btn" id="refreshBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M23 4v6h-6M1 20v-6h6"/>
                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
            </svg>
            刷新列表
        </button>
    </div>
    <div class="content">
        <div id="fileList" class="file-list">
            <div class="loading">加载中...</div>
        </div>
    </div>
</div>

<script>
    let currentPath = '';

    // 格式化文件大小
    function formatFileSize(bytes) {
        if (bytes === 0) return '0 B';
        const k = 1024;
        const sizes = ['B', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    // 渲染文件树
    function renderFileTree(files, level = 0) {
        if (!files || files.length === 0) {
            return '<div class="empty">暂无文件</div>';
        }

        return `<ul class="file-list" style="padding-left: ${level * 20}px">` +
            files.map(file => {
                if (file.type === 'directory') {
                    return `
                            <li class="file-item directory-item">
                                <div class="item-content" onclick="toggleDirectory(this)">
                                    <span class="dir-icon">📁</span>
                                    <span class="file-name">${escapeHtml(file.name)}</span>
                                    <span class="file-size">(${file.children ? file.children.length : 0} 项)</span>
                                </div>
                                <div class="children" style="display: none;">
                                    ${file.children ? renderFileTree(file.children, level + 1) : ''}
                                </div>
                            </li>
                        `;
                } else {
                    return `
                            <li class="file-item">
                                <a href="/api/download/${encodeURIComponent(file.path)}" class="download-link">
                                    <div class="item-content">
                                        <span class="file-icon">📄</span>
                                        <span class="file-name">${escapeHtml(file.name)}</span>
                                        <span class="file-size">${formatFileSize(file.size)}</span>
                                    </div>
                                </a>
                            </li>
                        `;
                }
            }).join('') +
            `</ul>`;
    }

    // HTML转义
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // 切换目录展开/收起
    function toggleDirectory(element) {
        const children = element.parentElement.querySelector('.children');
        if (children) {
            if (children.style.display === 'none') {
                children.style.display = 'block';
                element.querySelector('.dir-icon').textContent = '📂';
            } else {
                children.style.display = 'none';
                element.querySelector('.dir-icon').textContent = '📁';
            }
        }
    }

    // 加载文件列表
    async function loadFileList() {
        const fileListDiv = document.getElementById('fileList');
        const refreshBtn = document.getElementById('refreshBtn');

        try {
            fileListDiv.innerHTML = '<div class="loading">加载中...</div>';
            refreshBtn.classList.add('loading');

            const response = await fetch('/api/files');
            const data = await response.json();

            if (data.success) {
                if (data.files && data.files.length > 0) {
                    fileListDiv.innerHTML = renderFileTree(data.files);
                } else {
                    fileListDiv.innerHTML = '<div class="empty">📭 暂无文件，请将文件放入 files 目录</div>';
                }
            } else {
                throw new Error(data.error || '加载失败');
            }
        } catch (error) {
            console.error('加载失败:', error);
            fileListDiv.innerHTML = `<div class="error">❌ 加载失败: ${error.message}<br><br>请确保服务器已正确配置文件目录</div>`;
        } finally {
            refreshBtn.classList.remove('loading');
        }
    }

    // 页面加载时获取文件列表
    document.addEventListener('DOMContentLoaded', () => {
        loadFileList();

        // 刷新按钮事件
        document.getElementById('refreshBtn').addEventListener('click', loadFileList);
    });

    // 全局函数供onclick使用
    window.toggleDirectory = toggleDirectory;
</script>
</body>
</html>
